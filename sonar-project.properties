sonar.projectKey=TicketPro
sonar.projectName=TicketPro
sonar.projectVersion=1.0
sonar.host.url=http://localhost:9000
sonar.token=${SONAR_TOKEN}

# === Source and Encoding ===
sonar.sources=src
sonar.sourceEncoding=UTF-8

# === Test and Coverage Settings ===
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.d.ts,**/*.test.ts,**/*.test.tsx,**/__mocks__/**,**/test/**

# === Exclusions and Inclusions ===
# Exclude node_modules and build artifacts
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.spec.ts,**/*.spec.tsx

# === Optional: Additional React/TS Rules ===
# sonar.typescript.tsconfigPath=tsconfig.json
# sonar.javascript.node.maxspace=4096

# === Plugins ===
# Ensure SonarQube has the "SonarJS" and "SonarTS" plugins installed for best results.